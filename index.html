<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK7 | TACTICAL COMMAND</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanlines"></div>

    <div id="auth-gateway" class="container">
        <div class="terminal-header">
            <span class="status-blip"></span>
            SYSTEM BOOT... OK.
        </div>
        <div class="auth-box">
            <h1 class="glitch" data-text="FORCE SPECIAL SK7">FORCE SPECIAL SK7</h1>
            <p id="typewriter"></p>
            <div class="input-group">
                <span class="prompt">>_</span>
                <input type="password" id="pass-input" placeholder="ENTREZ LE CODE D'ACCÈS" autocomplete="off" autofocus>
            </div>
            <button id="auth-btn" class="btn-tech">AUTHENTIFICATION</button>
            <p id="error-msg" class="error hidden">ACCÈS REFUSÉ : PROTOCOLE DE SÉCURITÉ ACTIVÉ</p>
        </div>
    </div>

    <div id="command-center" class="container hidden">
        <header class="hud-header">
            <div class="hud-info">OPÉRATION: DOMINANT | STATUT: <span class="online">EN LIGNE</span></div>
            <h1 class="hud-title">SK7 SIEMPRE DOMINA</h1>
            <div class="hud-info text-right">COORD: 19.75, -72.20 | UPLINK: SECURE</div>
        </header>

        <div class="grid-layout">
            <div class="nav-panel">
                <button class="btn-tech nav-btn">LISTE DES MEMBRES</button>
                <button class="btn-tech nav-btn">LISTE DES CLANS</button>
                <button class="btn-tech nav-btn">NOMBRE TOTAL</button>
                <button class="btn-tech nav-btn">RECRUTEMENT</button>
            </div>

            <div class="main-display">
                <div class="video-container">
                    <div class="video-overlay-corners"></div>
                    <div class="play-icon">▶</div>
                    <p class="video-text">TRANSMISSION EN COURS...</p>
                </div>
                <div class="credits">
                    <p>Créé par <strong>DRUZZ IMPEROR</strong></p>
                    <p class="sub-credit">SK7 Créateur | Destructeur suprême</p>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
